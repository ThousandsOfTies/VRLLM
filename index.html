<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>VRoid AI アシスタント</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="app">

    <!-- VRM ビューワー -->
    <div id="viewer-panel">
      <canvas id="vrm-canvas"></canvas>
      <input type="file" id="vrm-file-input" accept=".vrm" hidden>
      <input type="file" id="vrma-file-input" accept=".vrma" hidden>
      <div id="viewer-controls">
        <button id="load-vrma-btn" title="VRMAアニメーションを読み込んで再生">🎬 VRMA</button>
        <select id="vrma-preset-select" title="モーションを選択">
          <option value="vrma/VRMA_01.vrma">01 全身を見せる</option>
          <option value="vrma/VRMA_02.vrma">02 挨拶</option>
          <option value="vrma/VRMA_03.vrma" selected>03 Vサイン</option>
          <option value="vrma/VRMA_04.vrma">04 撃つ</option>
          <option value="vrma/VRMA_05.vrma">05 回る</option>
          <option value="vrma/VRMA_06.vrma">06 モデルポーズ</option>
          <option value="vrma/VRMA_07.vrma">07 屈伸運動</option>
        </select>
        <span id="status-indicator">読み込み中...</span>
      </div>
    </div>

    <!-- チャットパネル -->
    <div id="chat-panel">
      <div id="chat-header">
        <h1>VRoid AI アシスタント</h1>
        <button id="settings-btn" title="設定">⚙️ 設定</button>
      </div>

      <div id="chat-messages"></div>

      <div id="chat-input-area">
        <button id="mic-btn" title="音声入力 (クリックで開始/停止)">🎤</button>
        <textarea id="chat-input" placeholder="メッセージを入力... (Enter で送信)" rows="1"></textarea>
        <button id="send-btn">送信</button>
      </div>
    </div>

    <!-- 設定パネル (オーバーレイ) -->
    <div id="settings-panel" class="hidden">
      <div id="settings-inner">
        <h2>⚙️ 設定</h2>

        <label>
          VRMモデル
          <button type="button" id="load-vrm-btn">📁 VRMファイルを読み込む</button>
          <span id="vrm-load-status" class="hint"></span>
        </label>

        <label>
          APIエンドポイント
          <span class="hint">OpenAI互換ならOllama (http://localhost:11434/v1) も可</span>
          <input type="text" id="setting-endpoint" placeholder="https://api.openai.com/v1">
        </label>

        <label>
          APIキー
          <span class="hint">Ollamaはダミー文字列でも可 (例: ollama)</span>
          <input type="password" id="setting-api-key" placeholder="sk-...">
        </label>

        <label>
          モデル名
          <input type="text" id="setting-model" placeholder="gpt-4o-mini">
        </label>

        <label>
          TTS 言語
          <select id="setting-tts-lang">
            <option value="ja-JP">日本語 (ja-JP)</option>
            <option value="en-US">English (en-US)</option>
            <option value="zh-CN">中文 (zh-CN)</option>
          </select>
        </label>

        <label>
          AivisSpeech URL
          <span class="hint">起動中なら自動検出されます (デフォルト: http://localhost:10101)</span>
          <input type="text" id="setting-aivis-url" placeholder="http://localhost:10101">
        </label>

        <label>
          AivisSpeech 話者ID
          <span class="hint">話者IDは AivisSpeech の画面で確認できます</span>
          <div style="display:flex;gap:8px;align-items:center">
            <input type="number" id="setting-aivis-speaker" placeholder="888753760" style="flex:1">
            <button type="button" id="aivis-check-btn">疎通確認</button>
          </div>
          <span id="aivis-status" class="hint"></span>
        </label>

        <label>
          Aivis Cloud API キー
          <span class="hint">Cloud API を使うと PC なしでスマホからも高品質 TTS が使えます (<a href="https://hub.aivis-project.com/cloud-api/dashboard" target="_blank">取得</a>)</span>
          <input type="password" id="setting-cloud-api-key" placeholder="aivis-...">
        </label>

        <label>
          Aivis Cloud API モデル UUID
          <span class="hint">AivisHub のモデルページ URL に含まれる UUID (<a href="https://hub.aivis-project.com/" target="_blank">モデル一覧</a>)</span>
          <input type="text" id="setting-cloud-model-uuid" placeholder="a59cb814-0083-4369-8542-f51a29e72af7">
        </label>

        <label>
          システムプロンプト
          <textarea id="setting-system-prompt" rows="5"></textarea>
        </label>

        <div class="settings-actions">
          <button id="save-settings-btn">💾 保存</button>
          <button id="cancel-settings-btn">キャンセル</button>
          <button id="clear-history-btn">🗑️ 履歴クリア</button>
        </div>
      </div>
    </div>

  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
